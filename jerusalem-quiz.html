<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון יום ירושלים — 60 שנה לאיחוד העיר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#131C31;        /* שמי ערב מעל החומות */
    --night-soft:#1C2842;
    --gold:#E8B84B;         /* ירושלים של זהב */
    --gold-deep:#C79A2E;
    --stone:#F4EDDD;        /* אבן ירושלמית */
    --stone-dark:#E5DAC2;
    --ceramic:#2E7E8F;      /* קרמיקה ארמנית */
    --ceramic-soft:#3D96A8;
    --ink:#2A2418;
    --wrong:#B4563C;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Heebo',sans-serif;
    background:var(--night);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(232,184,75,.08), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(46,126,143,.12), transparent 45%);
    color:var(--stone);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px 16px;
  }
  .app{width:100%;max-width:640px}

  /* ===== קשת ירושלמית — האלמנט החתום ===== */
  .card{
    background:var(--stone);
    color:var(--ink);
    border-radius:180px 180px 20px 20px; /* קשת אבן */
    padding:64px 40px 40px;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
    position:relative;
    overflow:hidden;
  }
  .card::before{ /* פס קרמיקה ארמנית בראש הקשת */
    content:"";
    position:absolute;inset:0 0 auto 0;height:14px;
    background:repeating-linear-gradient(90deg,
      var(--ceramic) 0 18px, var(--gold) 18px 24px,
      var(--ceramic-soft) 24px 42px, var(--gold) 42px 48px);
    opacity:.9;
  }

  h1,h2,.rank-title{font-family:'Frank Ruhl Libre',serif}

  /* ===== מסך פתיחה ===== */
  .eyebrow{
    text-align:center;color:var(--ceramic);
    font-weight:700;letter-spacing:.15em;font-size:.85rem;
    margin-bottom:10px;
  }
  h1{
    text-align:center;font-weight:900;font-size:2.3rem;line-height:1.15;
    color:var(--ink);
  }
  h1 .gold{color:var(--gold-deep)}
  .subtitle{
    text-align:center;margin:16px auto 8px;max-width:44ch;
    font-size:1.05rem;color:#5A5240;line-height:1.6;
  }
  .skyline{
    display:block;margin:22px auto 8px;width:min(340px,90%);
  }
  .skyline path{fill:none;stroke:var(--gold-deep);stroke-width:2.5;stroke-linecap:round}
  .skyline .dome{fill:var(--gold);stroke:var(--gold-deep)}

  .btn{
    display:block;margin:26px auto 0;
    font-family:'Heebo',sans-serif;font-weight:700;font-size:1.1rem;
    background:var(--ceramic);color:#fff;border:none;cursor:pointer;
    padding:14px 44px;border-radius:999px;
    transition:transform .15s, background .15s;
  }
  .btn:hover{background:var(--ceramic-soft);transform:translateY(-2px)}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
  .btn.gold{background:var(--gold-deep)}
  .btn.gold:hover{background:var(--gold)}

  /* ===== שאלה ===== */
  .category{
    display:inline-block;background:var(--night);color:var(--gold);
    font-size:.8rem;font-weight:700;padding:5px 14px;border-radius:999px;
    margin-bottom:14px;
  }
  .q-text{font-size:1.3rem;font-weight:700;line-height:1.45;margin-bottom:22px}
  .options{display:grid;gap:12px}
  .opt{
    font-family:'Heebo',sans-serif;font-size:1rem;text-align:right;
    background:#fff;border:2px solid var(--stone-dark);border-radius:14px;
    padding:13px 18px;cursor:pointer;color:var(--ink);line-height:1.5;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .opt:hover:not(:disabled){border-color:var(--ceramic);transform:translateX(-3px)}
  .opt:focus-visible{outline:3px solid var(--ceramic);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#EAF3E4;border-color:#6E8F4E;font-weight:700}
  .opt.wrong{background:#F6E7E1;border-color:var(--wrong);opacity:.85}

  .feedback{
    margin-top:20px;padding:16px 18px;border-radius:14px;
    background:var(--night);color:var(--stone);line-height:1.6;font-size:.98rem;
    animation:fadeUp .3s ease;
  }
  .feedback strong{color:var(--gold)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ===== התקדמות — פס זהב + מונה ===== */
  .progress-wrap{margin:0 0 20px}
  .progress-label{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:.85rem;color:#6B6250;font-weight:500;margin-bottom:7px;
  }
  .progress-label .cat-name{color:var(--ceramic);font-weight:700}
  .progress-track{
    height:8px;border-radius:999px;background:var(--stone-dark);overflow:hidden;
  }
  .progress-fill{
    height:100%;border-radius:999px;
    background:linear-gradient(90deg,var(--gold-deep),var(--gold));
    transition:width .3s ease;
  }

  /* ===== תוצאה ===== */
  .score-big{
    text-align:center;font-family:'Frank Ruhl Libre',serif;
    font-size:4rem;font-weight:900;color:var(--gold-deep);line-height:1;
  }
  .score-of{text-align:center;color:#5A5240;margin-bottom:18px}
  .rank-title{
    text-align:center;font-size:1.7rem;font-weight:900;color:var(--ink);
    margin-bottom:10px;
  }
  .rank-desc{
    text-align:center;max-width:46ch;margin:0 auto;line-height:1.7;color:#4A4334;
  }
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
  .actions .btn{margin:0}
  .copied{
    text-align:center;color:var(--ceramic);font-weight:700;margin-top:12px;
    min-height:1.4em;
  }

  @media (max-width:480px){
    .card{padding:52px 22px 30px;border-radius:120px 120px 16px 16px}
    h1{font-size:1.7rem}
    .q-text{font-size:1.12rem}
    .score-big{font-size:3.2rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="app">
  <div class="card" id="card">
    <!-- התוכן מוזרק כאן -->
  </div>
</div>

    correct:0,
    fb:"עם השקת הרכבת הקלה נסגר רחוב יפו לרכבים פרטיים — היום עוברים בו רק הרכבת והולכי רגל. והתשובה הרביעית? גם היא נכונה, אבל הסבלנות חזרה כשנגמרו העבודות."

  {

    opts:["עמק רפאים","דרך בית לחם","רחוב הפלמ\"ח","אין מושבה גרמנית, יש רק בתי קפה"],
    correct:0,
    fb:"עמק רפאים — הרחוב שהקימו הטמפלרים הגרמנים במאה ה-19, והיום אחד מרחובות בתי הקפה המבוקשים בעיר. אז התשובה הרביעית לא רחוקה מהאמת."
  }

const TOTAL = QUESTIONS.length;

const RANKS = [
  {min:0, max:10, title:"תייר בבירה 🎒",
   desc:"זה בסדר, כולם מתחילים איפשהו. קח יום חופש, רד לשוק, תאכל בייגלה עם זעתר ותחזור לנסות. ירושלים סבלנית — היא מחכה כבר 3,000 שנה."},
  {min:11, max:19, title:"ירושלמי בנשמה 💛",
   desc:"יש לך את זה! אתה כבר מבדיל בין נחלאות לרחביה ולוקח ז'קט בקיץ. עוד כמה שנים של פקקים בכניסה לעיר ואתה שם."},
  {min:20, max:27, title:"ותיק נחלאות 🏛️",
   desc:"כל הכבוד! אתה מכיר את העיר כמו את כף ידך, אומר \"מָתָיִם\" בלי להתבלבל, ויש לך דעה נחרצת בסוגיית החומוס. ירושלמי מן המניין."},
  {min:28, max:99, title:"אתה בעצם טדי קולק 👑",
   desc:"תוצאה יוצאת דופן! ברמה כזאת של ידע, מגיע לך רחוב על שמך. או לפחות מקום חניה קבוע ליד השוק — וזה, כידוע, שווה הרבה יותר."}
];

let current = 0;
let score = 0;
const card = document.getElementById('card');

function skylineSVG(){
  return `<svg class="skyline" viewBox="0 0 340 70" aria-hidden="true">
    <path d="M10 60 H60 V38 H80 V60 H120"/>
    <path class="dome" d="M120 60 V45 Q145 18 170 45 V60 Z"/>
    <path d="M170 60 H210 V30 L218 20 L226 30 V60 H270 V42 H290 V60 H330"/>
    <path d="M218 20 V10"/>
  </svg>`;
}

function progressHTML(){
  const pct = Math.round((current / TOTAL) * 100);
  return `
    <div class="progress-wrap">
      <div class="progress-label">
        <span class="cat-name">${QUESTIONS[current].cat}</span>
        <span>שאלה ${current+1} מתוך ${TOTAL}</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="${TOTAL}" aria-valuenow="${current+1}">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
}

function showStart(){
  current = 0; score = 0;
  card.innerHTML = `
    <p class="eyebrow">יום ירושלים · 60 שנה לאיחוד העיר</p>
    <h1>ירושלים של <span class="gold">זהב</span><br>(ושל פקקים)</h1>
    ${skylineSVG()}
    <p class="subtitle">32 שאלות על העיר הכי עתיקה, הכי יפה והכי מסובכת בעולם. קצת היסטוריה, קצת שכונות, קצת אוכל — והרבה דברים שרק ירושלמי אמיתי יודע.</p>
    <button class="btn" id="startBtn">יאללה, מתחילים</button>
  `;
  document.getElementById('startBtn').addEventListener('click', showQuestion);
}

function showQuestion(){
  const q = QUESTIONS[current];
  card.innerHTML = `
    ${progressHTML()}
    <p class="q-text">${q.q}</p>
    <div class="options" id="opts">
      ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('')}
    </div>
    <div id="fbArea"></div>
  `;
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=>answer(parseInt(btn.dataset.i)));
  });
  card.querySelector('.opt').focus();
}

function answer(i){
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b=>b.disabled=true);
  buttons[q.correct].classList.add('correct');
  if(i === q.correct){
    score++;
  } else {
    buttons[i].classList.add('wrong');
  }
  const isLast = current === TOTAL-1;
  document.getElementById('fbArea').innerHTML = `
    <div class="feedback">
      ${i===q.correct ? '✔️ ' : ''}${q.fb}
      <button class="btn gold" id="nextBtn" style="margin-top:16px">${isLast ? 'לתוצאה שלי' : 'לשאלה הבאה'}</button>
    </div>
  `;
  const nb = document.getElementById('nextBtn');
  nb.addEventListener('click', ()=>{
    current++;
    current < TOTAL ? showQuestion() : showResult();
  });
  nb.focus();
}

function showResult(){
  const rank = RANKS.find(r => score>=r.min && score<=r.max);
  card.innerHTML = `
    <p class="eyebrow">יום ירושלים · 60 שנה לאיחוד העיר</p>
    <div class="score-big">${score}</div>
    <p class="score-of">מתוך ${TOTAL} שאלות</p>
    <p class="rank-title">${rank.title}</p>
    <p class="rank-desc">${rank.desc}</p>
    ${skylineSVG()}
    <div class="actions">
      <button class="btn gold" id="shareBtn">שיתוף התוצאה</button>
      <button class="btn" id="againBtn">עוד סיבוב</button>
    </div>
    <p class="copied" id="copiedMsg"></p>
  `;
  document.getElementById('againBtn').addEventListener('click', showStart);
  document.getElementById('shareBtn').addEventListener('click', ()=>{
    const text = `חידון יום ירושלים 🎉 עניתי נכון על ${score} מתוך ${TOTAL} וקיבלתי את התואר: ${rank.title} — כמה אתם תקבלו?`;
    if(navigator.share){
      navigator.share({text}).catch(()=>{});
    } else {
      navigator.clipboard.writeText(text).then(()=>{
        document.getElementById('copiedMsg').textContent = 'הטקסט הועתק — אפשר להדביק בוואטסאפ 📋';
      }).catch(()=>{
        document.getElementById('copiedMsg').textContent = text;
      });
    }
  });
}

showStart();
</script>
